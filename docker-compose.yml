services:
  api:
    build: ./server
    ports:
      - "3000:3000"
    volumes:
      - ./server/uploads:/app/uploads
      - db-data:/app/prisma
    environment:
      - DATABASE_URL=file:./dev.db
      - JWT_SECRET=change-me-in-production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web-mobile:
    build: ./web-mobile
    restart: unless-stopped
    depends_on:
      - api

  web-admin:
    build: ./web-admin
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./server/uploads:/var/www/uploads
    depends_on:
      - api
      - web-mobile
      - web-admin
    restart: unless-stopped

volumes:
  db-data:
